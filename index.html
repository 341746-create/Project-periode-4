<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theater Login | Stage & Screen</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="theater-bg-container">
        <img src="defocused-background-luxurious-private-cinema-600nw-2599415605.webp" alt="Luxurious Private Cinema Background" class="theater-image">
        <div class="background-overlay"></div>
    </div>

    <div class="login-container">
        <div class="login-header">
            <h2>Welcome Back</h2>
            <p>Reserve your seat under the spotlight</p>
        </div>

        <form class="login-form" id="loginForm">
            <div class="input-group">
                <label for="email">Email Address</label>
                <div class="input-wrapper">
                    <i class="fa-regular fa-envelope input-icon"></i>
                    <input type="email" id="email" placeholder="e.g., name@example.com" required>
                </div>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock input-icon"></i>
                    <input type="password" id="password" placeholder="Enter your password" required>
                    <button type="button" id="togglePassword" class="toggle-password">
                        <i class="fa-regular fa-eye" id="eyeIcon"></i>
                    </button>
                </div>
            </div>

            <div class="form-actions">
                <label class="remember-me">
                    <input type="checkbox" id="remember">
                    Remember me
                </label>
                <a href="#" class="forgot-password">Forgot Password?</a>
            </div>

            <button type="submit" class="btn-login">
                Sign In <i class="fa-solid fa-arrow-right"></i>
            </button>
        </form>

        <div class="login-footer">
            <p>New to the theater? <a href="#" id="createAccountLink">Create an account</a></p>
        </div>
    </div>

    <div id="registerModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="closeModal">&times;</span>
            <h2>Join the Theater</h2>
            <p>Create an account for premium seat booking</p>
            
            <form id="registerForm">
                <div class="input-group">
                    <label for="regName">Full Name</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-user input-icon"></i>
                        <input type="text" id="regName" placeholder="Your name" required>
                    </div>
                </div>
                <div class="input-group">
                    <label for="regEmail">Email Address</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-envelope input-icon"></i>
                        <input type="email" id="regEmail" placeholder="name@example.com" required>
                    </div>
                </div>
                <div class="input-group">
                    <label for="regPassword">Create Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" id="regPassword" placeholder="Choose a secure password" required>
                    </div>
                </div>
                <button type="submit" class="btn-login">Register Now</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
