<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uitloggen - Theater</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="logout-card">
        <div class="icon-container">
            <i class="fa-solid fa-arrow-right-from-bracket logout-icon"></i>
        </div>

        <h2>Weet je het zeker?</h2>
        <p class="subtitle">Je staat op het punt om je sessie te beëindigen.</p>

        <div class="button-group">
            <button type="button" id="logoutBtn" class="btn-logout">
                Uitloggen <i class="fa-solid fa-arrow-right"></i>
            </button>
            
            <a href="#" id="cancelBtn" class="btn-cancel">Annuleren</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
